services:
  axl-witness:
    build: ./apps/witness-node
    ports:
      - "${AXL_WITNESS_PORT}:${AXL_WITNESS_PORT}"
    env_file: .env
    volumes:
      - ./axl-configs:/axl-configs:ro

  axl-verifier:
    build: ./apps/verifier-node
    ports:
      - "${AXL_VERIFIER_PORT}:${AXL_VERIFIER_PORT}"
    env_file: .env
    volumes:
      - ./axl-configs:/axl-configs:ro

  axl-propagator:
    build: ./apps/propagator-node
    ports:
      - "${AXL_PROPAGATOR_PORT}:${AXL_PROPAGATOR_PORT}"
    env_file: .env
    volumes:
      - ./axl-configs:/axl-configs:ro

  axl-memory:
    build: ./apps/memory-node
    ports:
      - "${AXL_MEMORY_PORT}:${AXL_MEMORY_PORT}"
    env_file: .env
    volumes:
      - ./axl-configs:/axl-configs:ro

  orchestrator:
    build: ./apps/orchestrator
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - axl-witness
      - axl-verifier
      - axl-propagator
      - axl-memory

  dashboard:
    build: ./apps/dashboard
    ports:
      - "4000:4000"
    env_file: .env
    depends_on:
      - orchestrator

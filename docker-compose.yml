services:
  axl-propagator:
    build:
      context: .
      dockerfile: apps/propagator-node/Dockerfile
    ports:
      - '${AXL_PROPAGATOR_PORT}:${AXL_PROPAGATOR_PORT}'
      - '10022:10022'
    env_file: .env
    volumes:
      - ./axl-configs:/app/axl-configs:ro
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:10022/health']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  axl-witness:
    build:
      context: .
      dockerfile: apps/witness-node/Dockerfile
    ports:
      - '${AXL_WITNESS_PORT}:${AXL_WITNESS_PORT}'
      - '10002:10002'
    env_file: .env
    environment:
      AXL_PEER_HOST: axl-propagator
    volumes:
      - ./axl-configs:/app/axl-configs:ro
    depends_on:
      axl-propagator:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:10002/health']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  axl-verifier:
    build:
      context: .
      dockerfile: apps/verifier-node/Dockerfile
    ports:
      - '${AXL_VERIFIER_PORT}:${AXL_VERIFIER_PORT}'
      - '10012:10012'
    env_file: .env
    environment:
      AXL_PEER_HOST: axl-propagator
    volumes:
      - ./axl-configs:/app/axl-configs:ro
    depends_on:
      axl-propagator:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:10012/health']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  axl-memory:
    build:
      context: .
      dockerfile: apps/memory-node/Dockerfile
    ports:
      - '${AXL_MEMORY_PORT}:${AXL_MEMORY_PORT}'
      - '10032:10032'
    env_file: .env
    environment:
      AXL_PEER_HOST: axl-propagator
    volumes:
      - ./axl-configs:/app/axl-configs:ro
    depends_on:
      axl-propagator:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:10032/health']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  orchestrator:
    build:
      context: .
      dockerfile: apps/orchestrator/Dockerfile
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      WITNESS_MGMT_URL: http://axl-witness:10002
      VERIFIER_MGMT_URL: http://axl-verifier:10012
    depends_on:
      axl-witness:
        condition: service_healthy
      axl-verifier:
        condition: service_healthy
      axl-propagator:
        condition: service_healthy
      axl-memory:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      args:
        VITE_ORCHESTRATOR_URL: ${VITE_ORCHESTRATOR_URL:-/api}
        VITE_AGENT_REGISTRY_ADDRESS: ${VITE_AGENT_REGISTRY_ADDRESS:-0xC1476f6Dfc8C3f6593B21FDab8DA156e9Be274B1}
        VITE_AEGIS_NAME_REGISTRY_ADDRESS: ${VITE_AEGIS_NAME_REGISTRY_ADDRESS:-0xC8e1B8763be717Daee9b41CFD68F723f6bA06aC4}
        VITE_PUBLIC_RESOLVER_ADDRESS: ${VITE_PUBLIC_RESOLVER_ADDRESS:-0x231b0Ee14048e9dCcD1d247744d114a4EB5E8E63}
        VITE_AEGIS_COURT_ADDRESS: ${VITE_AEGIS_COURT_ADDRESS:-0xA35Ec64578EF4C85a88fE19A81a4303a784B9dd6}
        VITE_0G_EXPLORER_URL: ${VITE_0G_EXPLORER_URL:-https://chainscan-galileo.0g.ai}
        VITE_KEEPERHUB_WORKFLOW_ID: ${VITE_KEEPERHUB_WORKFLOW_ID:-aegis.execute_remedy}
    ports:
      - '4000:4000'
    depends_on:
      - orchestrator
